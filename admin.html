<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFSQUARE — MongoDB Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand:#1e3c72; --accent:#ffc107; }
        body              { background:#f0f2f5; font-family:'Segoe UI',sans-serif; margin:0; }
        .topbar           { background:var(--brand); color:#fff; padding:13px 24px;
                            display:flex; align-items:center; justify-content:space-between;
                            position:sticky; top:0; z-index:100;
                            box-shadow:0 2px 8px rgba(0,0,0,.25); }
        .brand em         { color:var(--accent); font-style:normal; font-weight:700; }
        .stat-card        { border:none; border-radius:10px;
                            box-shadow:0 2px 10px rgba(0,0,0,.07); }
        .stat-num         { font-size:2rem; font-weight:700; color:var(--brand); }
        .tbl-row          { cursor:pointer; transition: background .1s; }
        .tbl-row:hover td { background:#eef2ff; }
        .tbl-row.selected td { background:#dde6ff; }
        #detail-col       { display:none; }
        .dl               { font-size:.72rem; font-weight:700; color:#888;
                            text-transform:uppercase; letter-spacing:.6px; margin-top:12px; }
        .dv               { font-size:.92rem; color:#212529; word-break:break-word; }
        .msg-box          { background:#f8f9fa; border-radius:6px; padding:10px;
                            font-size:.85rem; white-space:pre-wrap; border:1px solid #dee2e6; }
        #toasts           { position:fixed; bottom:20px; right:20px; z-index:9999; min-width:260px; }

        /* priority colours */
        .pri-urgent { color:#dc3545; font-weight:700; }
        .pri-high   { color:#fd7e14; font-weight:600; }
        .pri-medium { color:#0d6efd; }
        .pri-low    { color:#6c757d; }
    </style>
</head>
<body>

<!-- ── Top bar ────────────────────────────────────────────────────────────── -->
<div class="topbar">
    <div class="brand fs-5"><em>KF</em>SQUARE &nbsp;|&nbsp; MongoDB Admin</div>
    <div id="db-badge" class="small opacity-75">
        <i class="fas fa-circle-notch fa-spin me-1"></i>Connecting...
    </div>
</div>

<div class="container-fluid px-4 py-4">

    <!-- ── Stat cards ────────────────────────────────────────────────────── -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card stat-card p-3 text-center">
                <div class="stat-num" id="s-total">—</div>
                <div class="text-muted small">Total Contacts</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stat-card p-3 text-center">
                <div class="stat-num text-primary" id="s-new">—</div>
                <div class="text-muted small">New</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stat-card p-3 text-center">
                <div class="stat-num text-success" id="s-qualified">—</div>
                <div class="text-muted small">Qualified</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stat-card p-3 text-center">
                <div class="stat-num text-warning" id="s-week">—</div>
                <div class="text-muted small">This Week</div>
            </div>
        </div>
    </div>

    <!-- ── Main row ──────────────────────────────────────────────────────── -->
    <div class="row g-3">

        <!-- Contact list -->
        <div class="col-lg-7" id="list-col">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <div class="d-flex flex-wrap gap-2 align-items-center">
                        <span class="fw-bold me-auto">Contact Submissions</span>
                        <input id="inp-search" type="search" placeholder="Search..."
                               class="form-control form-control-sm" style="width:180px">
                        <select id="sel-status" class="form-select form-select-sm" style="width:130px">
                            <option value="">All statuses</option>
                            <option value="new">New</option>
                            <option value="contacted">Contacted</option>
                            <option value="qualified">Qualified</option>
                            <option value="proposal">Proposal</option>
                            <option value="converted">Converted</option>
                            <option value="closed">Closed</option>
                        </select>
                        <select id="sel-priority" class="form-select form-select-sm" style="width:120px">
                            <option value="">All priority</option>
                            <option value="urgent">Urgent</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                        <select id="sel-service" class="form-select form-select-sm" style="width:170px">
                            <option value="">All services</option>
                            <option value="data-engineering">Data Engineering</option>
                            <option value="predictive-analytics">Predictive Analytics</option>
                            <option value="llm-integration">LLM Integration</option>
                            <option value="business-intelligence">Business Intelligence</option>
                            <option value="data-governance">Data Governance</option>
                            <option value="strategic-consulting">Consulting</option>
                            <option value="other">Other</option>
                        </select>
                        <button id="btn-refresh" class="btn btn-sm btn-outline-secondary" title="Refresh">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle small">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">Name</th>
                                <th>Email</th>
                                <th>Service</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="tbody">
                            <tr><td colspan="6" class="text-center text-muted py-5">
                                <i class="fas fa-circle-notch fa-spin me-2"></i>Loading...
                            </td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer bg-white d-flex justify-content-between align-items-center py-2">
                    <small class="text-muted" id="pg-info"></small>
                    <div class="btn-group btn-group-sm">
                        <button id="btn-prev" class="btn btn-outline-secondary" disabled>
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button id="btn-next" class="btn btn-outline-secondary" disabled>
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detail panel -->
        <div class="col-lg-5" id="detail-col">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                    <span class="fw-bold">Contact Detail</span>
                    <button id="btn-close" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="card-body" id="detail-body" style="max-height:500px;overflow-y:auto"></div>
                <div class="card-footer bg-white d-flex gap-2 align-items-center">
                    <select id="sel-new-status" class="form-select form-select-sm" style="width:150px">
                        <option value="new">New</option>
                        <option value="contacted">Contacted</option>
                        <option value="qualified">Qualified</option>
                        <option value="proposal">Proposal</option>
                        <option value="converted">Converted</option>
                        <option value="closed">Closed</option>
                    </select>
                    <button id="btn-save-status" class="btn btn-sm btn-primary">
                        <i class="fas fa-save me-1"></i>Save
                    </button>
                    <button id="btn-delete" class="btn btn-sm btn-outline-danger ms-auto">
                        <i class="fas fa-trash me-1"></i>Delete
                    </button>
                </div>
            </div>
        </div>

        <!-- DB Info -->
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-bold py-3">
                    <i class="fas fa-database me-2 text-primary"></i>Database Info
                </div>
                <div class="card-body small" id="db-info">
                    <span class="text-muted">Loading...</span>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="toasts"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Admin JS — credentials are managed by the browser (Basic Auth header).
// No credentials are stored or visible in this script.
// ─────────────────────────────────────────────────────────────────────────────
const BASE  = window.location.origin;
const LIMIT = 15;
let page    = 1;
let current = null;

// ── helpers ───────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const fmt = iso => iso
    ? new Date(iso).toLocaleString('en-US',{ month:'short',day:'numeric',
        year:'numeric', hour:'2-digit', minute:'2-digit' })
    : '—';

function badge(s) {
    const map = { new:'primary', read:'secondary', responded:'success', archived:'danger' };
    return `<span class="badge bg-${map[s]||'secondary'}">${s}</span>`;
}

function toast(msg, type = 'success') {
    const id = 't' + Date.now();
    const bg = type === 'success' ? 'bg-success' : 'bg-danger';
    $('toasts').insertAdjacentHTML('beforeend',
        `<div id="${id}" class="toast show text-white ${bg} border-0 mb-2 align-items-center" role="alert">
            <div class="d-flex">
                <div class="toast-body">${msg}</div>
                <button class="btn-close btn-close-white me-2 m-auto"
                        onclick="document.getElementById('${id}').remove()"></button>
            </div>
        </div>`);
    setTimeout(() => document.getElementById(id)?.remove(), 3500);
}

// ── API fetch — credentials auto-sent by browser ──────────────────────────────
async function api(path, opts = {}) {
    const res = await fetch(`${BASE}/api/admin${path}`, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', ...(opts.headers||{}) },
        ...opts
    });
    const text = await res.text();
    try { return { ok: res.ok, status: res.status, data: JSON.parse(text) }; }
    catch { return { ok: false, status: res.status, data: { error: text } }; }
}

// ── load stats ────────────────────────────────────────────────────────────────
async function loadStats() {
    const { ok, data } = await api('/stats');
    if (!ok) {
        $('db-badge').innerHTML = `<i class="fas fa-circle text-danger me-1"></i> Disconnected`;
        return;
    }
    $('s-total').textContent     = data.contacts.total;
    $('s-new').textContent       = data.contacts.byStatus.new       || 0;
    $('s-qualified').textContent = data.contacts.byStatus.responded || 0;
    $('s-week').textContent      = data.contacts.lastWeek;

    $('db-badge').innerHTML =
        `<i class="fas fa-circle text-success me-1"></i>` +
        `<strong>${data.database}</strong> @ ${data.connection.host}:${data.connection.port}`;

    $('db-info').innerHTML = `
        <div class="row g-3 small">
            <div class="col-md-3">
                <div class="dl">Database</div>
                <div class="dv fw-bold">${data.database}</div>
            </div>
            <div class="col-md-3">
                <div class="dl">Host</div>
                <div class="dv">${data.connection.host}:${data.connection.port}</div>
            </div>
            <div class="col-md-3">
                <div class="dl">State</div>
                <div class="dv">${data.connection.state}</div>
            </div>
            <div class="col-md-3">
                <div class="dl">Collections</div>
                <div class="dv">
                    ${data.collections.map(c =>
                        `<span class="badge bg-secondary me-1">${c}</span>`).join('')}
                </div>
            </div>
            <div class="col-12">
                <div class="dl">Submissions by Service</div>
                <div class="dv mt-1">
                    ${Object.entries(data.contacts.byService)
                        .sort((a,b) => b[1]-a[1])
                        .map(([k,v]) =>
                            `<span class="badge bg-primary bg-opacity-75 me-1 mb-1">
                                ${k.replace(/-/g,' ')}: ${v}
                            </span>`).join('')}
                </div>
            </div>
        </div>`;
}

// ── load contacts ─────────────────────────────────────────────────────────────
async function loadContacts(p = 1) {
    page = p;
    const params = new URLSearchParams({ page, limit: LIMIT });
    const status  = $('sel-status').value;
    const service = $('sel-service').value;
    const search  = $('inp-search').value.trim();
    if (status)  params.set('status', status);
    if (service) params.set('serviceInterest', service);
    if (search)  params.set('search', search);

    $('tbody').innerHTML =
        `<tr><td colspan="6" class="text-center text-muted py-4">
            <i class="fas fa-circle-notch fa-spin me-2"></i>Loading...</td></tr>`;

    const { ok, data } = await api(`/contacts?${params}`);
    if (!ok) {
        $('tbody').innerHTML =
            `<tr><td colspan="6" class="text-center text-danger py-4">
                ${data.error || 'Failed to load'}</td></tr>`;
        return;
    }

    $('tbody').innerHTML = data.contacts.length
        ? data.contacts.map(c => `
            <tr class="tbl-row" onclick="openDetail('${c._id}')">
                <td class="ps-3 fw-semibold">${c.name}</td>
                <td class="text-muted">${c.email}</td>
                <td>${(c.serviceInterest||'—').replace(/-/g,' ')}</td>
                <td>${badge(c.status||'new')}</td>
                <td class="text-muted">${fmt(c.createdAt)}</td>
            </tr>`).join('')
        : `<tr><td colspan="6" class="text-center text-muted py-4">No records found</td></tr>`;

    $('pg-info').textContent = `Page ${data.page} of ${data.pages} — ${data.total} total`;
    $('btn-prev').disabled = data.page <= 1;
    $('btn-next').disabled = data.page >= data.pages;
}

// ── open detail ───────────────────────────────────────────────────────────────
async function openDetail(id) {
    const { ok, data } = await api(`/contacts/${id}`);
    if (!ok) { toast(data.error || 'Failed to load contact', 'error'); return; }
    current = data;
    $('sel-new-status').value = data.status || 'new';
    $('detail-col').style.display = 'block';
    $('detail-body').innerHTML = `
        <div class="dl">ID</div>
        <div class="dv font-monospace text-muted small">${data._id}</div>
        <div class="dl">Name</div>
        <div class="dv">${data.name}</div>
        <div class="dl">Email</div>
        <div class="dv"><a href="mailto:${data.email}">${data.email}</a></div>
        ${data.phone    ? `<div class="dl">Phone</div><div class="dv"><a href="tel:${data.phone}">${data.phone}</a></div>` : ''}
        ${data.company  ? `<div class="dl">Company</div><div class="dv">${data.company}</div>` : ''}
        <div class="dl">Service Interest</div>
        <div class="dv">${(data.serviceInterest||'—').replace(/-/g,' ')}</div>
        ${data.budget   ? `<div class="dl">Budget</div><div class="dv">${data.budget}</div>` : ''}
        ${data.timeline ? `<div class="dl">Timeline</div><div class="dv">${data.timeline}</div>` : ''}
        <div class="dl">Message</div>
        <div class="dv msg-box mt-1">${data.message}</div>
        <div class="dl">Status</div>
        <div class="dv">${badge(data.status||'new')}</div>
        <div class="dl">Submitted</div>
        <div class="dv text-muted small">${fmt(data.createdAt)}</div>`;
}

// ── save status ───────────────────────────────────────────────────────────────
$('btn-save-status').onclick = async () => {
    if (!current) return;
    const status = $('sel-new-status').value;
    const { ok, data } = await api(`/contacts/${current._id}/status`, {
        method: 'PATCH',
        body:   JSON.stringify({ status })
    });
    if (ok) { toast(`Status updated to "${status}"`); loadContacts(page); loadStats(); }
    else    { toast(data.error || 'Update failed', 'error'); }
};

// ── delete ────────────────────────────────────────────────────────────────────
$('btn-delete').onclick = async () => {
    if (!current) return;
    if (!confirm(`Delete contact from ${current.name}?\nThis cannot be undone.`)) return;
    const { ok, data } = await api(`/contacts/${current._id}`, { method: 'DELETE' });
    if (ok) {
        toast('Contact deleted');
        $('detail-col').style.display = 'none';
        current = null;
        loadContacts(page);
        loadStats();
    } else {
        toast(data.error || 'Delete failed', 'error');
    }
};

// ── close detail ──────────────────────────────────────────────────────────────
$('btn-close').onclick = () => {
    $('detail-col').style.display = 'none';
    current = null;
};

// ── filters, search, pagination ───────────────────────────────────────────────
let searchTimer;
$('inp-search').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadContacts(1), 350);
});
$('sel-status').addEventListener('change',  () => loadContacts(1));
$('sel-service').addEventListener('change', () => loadContacts(1));
$('btn-refresh').addEventListener('click',  () => { loadStats(); loadContacts(page); });
$('btn-prev').addEventListener('click', () => loadContacts(page - 1));
$('btn-next').addEventListener('click', () => loadContacts(page + 1));

// ── initial load ──────────────────────────────────────────────────────────────
loadStats();
loadContacts();
</script>

</body>
</html>
